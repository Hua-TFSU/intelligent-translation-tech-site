    <text x="545" y="494" fill="#66758a" font-family="Arial, PingFang SC, sans-serif" font-size="18">生成译文</text>
    <rect x="780" y="410" width="190" height="104" rx="24" fill="#ffffff" stroke="#cddff1"/>
    <rect x="803" y="434" width="42" height="42" rx="12" fill="#ffb545"/>
    <text x="868" y="462" fill="#162032" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="900">QA</text>
    <text x="803" y="494" fill="#66758a" font-family="Arial, PingFang SC, sans-serif" font-size="18">质量评估</text>
  </g>
  <path d="M712 224H780M875 276V410M780 462H712M617 410V276" fill="none" stroke="#1967e8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
