  <rect x="138" y="132" width="284" height="456" rx="28" fill="#ffffff" stroke="#d8e4f2"/>
  <text x="170" y="190" fill="#1967e8" font-family="Arial, PingFang SC, sans-serif" font-size="28" font-weight="800">Agent Workflow</text>
  <text x="170" y="236" fill="#162032" font-family="Arial, PingFang SC, sans-serif" font-size="52" font-weight="900">智能体设计</text>
  <text x="170" y="286" fill="#66758a" font-family="Arial, PingFang SC, sans-serif" font-size="24">Translation task pipeline</text>
  <rect x="170" y="344" width="206" height="56" rx="16" fill="#eef7ff" stroke="#c9def5"/>
  <text x="194" y="380" fill="#1967e8" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="800">Input analysis</text>
  <rect x="170" y="420" width="206" height="56" rx="16" fill="#f3fbf8" stroke="#c6eadf"/>
  <text x="194" y="456" fill="#167653" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="800">Human review</text>
  <g filter="url(#shadow)">
