    <rect x="545" y="196" width="42" height="42" rx="12" fill="url(#blue)"/>
    <text x="610" y="224" fill="#162032" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="900">Input</text>
    <text x="545" y="256" fill="#66758a" font-family="Arial, PingFang SC, sans-serif" font-size="18">任务识别</text>
