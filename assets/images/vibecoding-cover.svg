<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">VibeCoding cover</title>
  <desc id="desc">A bright technology-style cover showing AI-assisted coding, preview and iteration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.55" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#f8f4ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1967e8"/>
      <stop offset="1" stop-color="#12b8d7"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7762f2"/>
      <stop offset="1" stop-color="#1967e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#235290" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M80 110H1200M80 220H1200M80 330H1200M80 440H1200M80 550H1200M190 60V660M350 60V660M510 60V660M670 60V660M830 60V660M990 60V660M1150 60V660" stroke="#d8e8f5" stroke-width="1" opacity="0.55"/>
  <rect x="98" y="92" width="1084" height="536" rx="34" fill="#ffffff" stroke="#cddff1" filter="url(#shadow)"/>
  <rect x="142" y="136" width="510" height="448" rx="28" fill="#162032"/>
  <rect x="142" y="136" width="510" height="60" rx="28" fill="#24334b"/>
  <circle cx="184" cy="166" r="9" fill="#ff6b6b"/>
  <circle cx="216" cy="166" r="9" fill="#ffb545"/>
  <circle cx="248" cy="166" r="9" fill="#2ecaa5"/>
  <text x="176" y="246" fill="#7dd3fc" font-family="Menlo, Consolas, monospace" font-size="24">const idea = "translation tool";</text>
  <text x="176" y="296" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="24">prompt.refine(idea)</text>
  <text x="176" y="346" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="24">build.preview()</text>
  <text x="176" y="396" fill="#fef3c7" font-family="Menlo, Consolas, monospace" font-size="24">test.withUsers()</text>
  <text x="176" y="446" fill="#c4b5fd" font-family="Menlo, Consolas, monospace" font-size="24">deploy.whenReady()</text>
  <rect x="704" y="138" width="384" height="168" rx="28" fill="#f7fbff" stroke="#cddff1"/>
  <text x="738" y="190" fill="#1967e8" font-family="Arial, PingFang SC, sans-serif" font-size="28" font-weight="900">VibeCoding</text>
  <text x="738" y="242" fill="#162032" font-family="Arial, PingFang SC, sans-serif" font-size="42" font-weight="900">从想法到原型</text>
  <rect x="704" y="346" width="384" height="188" rx="28" fill="#ffffff" stroke="#cddff1"/>
  <g>
    <rect x="740" y="384" width="116" height="44" rx="14" fill="#eef7ff" stroke="#c9def5"/>
    <text x="772" y="413" fill="#1967e8" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="900">Prompt</text>
    <rect x="902" y="384" width="116" height="44" rx="14" fill="#f4f1ff" stroke="#ddd5ff"/>
    <text x="939" y="413" fill="#7762f2" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="900">Build</text>
    <rect x="740" y="460" width="116" height="44" rx="14" fill="#f3fbf8" stroke="#c6eadf"/>
    <text x="770" y="489" fill="#167653" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="900">Preview</text>
    <rect x="902" y="460" width="116" height="44" rx="14" fill="#fff8ea" stroke="#f2dca7"/>
    <text x="934" y="489" fill="#a56a00" font-family="Arial, PingFang SC, sans-serif" font-size="18" font-weight="900">Refine</text>
  </g>
