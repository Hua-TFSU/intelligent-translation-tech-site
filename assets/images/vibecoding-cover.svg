  <text x="621" y="531" fill="#ffffff" font-family="Arial, PingFang SC, sans-serif" font-size="26" font-weight="900">AI IDE</text>
  <path d="M664 504L704 474L704 446" fill="none" stroke="#12b8d7" stroke-width="5" stroke-linecap="round"/>
  <path d="M692 450L704 436L716 450" fill="none" stroke="#12b8d7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="1006" y="112" width="126" height="126" rx="32" fill="url(#violet)" filter="url(#shadow)"/>
  <path d="M1044 174L1066 196L1100 154" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
